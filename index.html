<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="auth-guard.js"></script>
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <h2 class="logo">HyperRoute Intelligence</h2>

      <nav>

        <a href="index.html" class="active">
          Create Driver
        </a>

        <a href="dashboard.html">
          Dashboard
        </a>

        <a href="drivers.html">
          View Drivers
        </a>

        <a href="drivers.html">
          Edit Driver
        </a>

        <a href="create-load.html">
          Create Load
        </a>

        <a href="loads.html">
          View Loads
        </a>

        <a href="compliance.html">
          Compliance
        </a>

        <a href="assign-vehicle.html">
          Assign Vehicle
        </a>

        <a href="create-maintenance.html">
          Maintenance
        </a>

      </nav>

    </aside>

    <!-- Main Content -->
    <main class="content">

      <div class="page-header">

        <h1>Create Driver</h1>

        <p>
          Add a new driver to your fleet management system.
        </p>

      </div>

      <form id="createDriverForm" class="card form">

        <div class="field">
          <label>First Name</label>
          <input
            type="text"
            name="first_name"
            placeholder="John"
            required>
        </div>

        <div class="field">
          <label>Last Name</label>
          <input
            type="text"
            name="last_name"
            placeholder="Smith"
            required>
        </div>

        <div class="field">
          <label>Phone Number</label>
          <input
            type="tel"
            name="phone"
            placeholder="(555) 555-5555">
        </div>

        <div class="field">
          <label>Email Address</label>
          <input
            type="email"
            name="email"
            placeholder="john@example.com">
        </div>

        <div class="field">
          <label>License Number</label>
          <input
            type="text"
            name="license_number"
            placeholder="CDL123456">
        </div>

        <div class="field">
          <label>License Expiration</label>
          <input
            type="date"
            name="license_expiration">
        </div>

        <div class="field">
          <label>Driver Photo URL</label>
          <input
            type="text"
            name="photo_url"
            placeholder="https://image-url.com">
        </div>

        <div class="field">
          <label>Document URL</label>
          <input
            type="text"
            name="file_url"
            placeholder="https://document-url.com">
        </div>

        <button type="submit" class="btn">
          Save Driver
        </button>

      </form>

      <p id="createDriverMessage" class="message"></p>

    </main>

  </div>

  <script src="companyContext.js"></script>
  <script>
    (function () {
      const SUPABASE_URL = "https://ygrikxlbfmtkovktwhdp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_vw7voiBA2V5_attC2dkUqw_PuOx468W";

      function readAccessToken(rawValue) {
        if (!rawValue) return null;
        try {
          const parsed = JSON.parse(rawValue);
          return parsed?.access_token
            || parsed?.currentSession?.access_token
            || parsed?.session?.access_token
            || parsed?.state?.session?.access_token
            || null;
        } catch (_) {
          return null;
        }
      }

      function getStoredAccessToken() {
        const exactToken = readAccessToken(localStorage.getItem("sb-ygrikxlbfmtkovktwhdp-auth-token"));
        if (exactToken) return exactToken;

        for (let i = 0; i < localStorage.length; i += 1) {
          const key = localStorage.key(i);
          if (!key || !key.startsWith("sb-") || !key.endsWith("-auth-token")) continue;
          const token = readAccessToken(localStorage.getItem(key));
          if (token) return token;
        }

        return null;
      }

      function setDriverMessage(message, color) {
        const output = document.getElementById("createDriverMessage");
        if (!output) return;
        output.textContent = message;
        output.style.color = color || "#334155";
      }

      async function saveDriverWithRpc(form) {
        await window.CompanyContext?.ready();
        const companyId = window.CompanyContext?.getCompanyId?.();
        const accessToken = getStoredAccessToken();

        if (!companyId) throw new Error("No active company selected.");
        if (!accessToken) throw new Error("No Supabase login token found. Log out and log back in.");

        const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/create_driver_secure_v8`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            p_company_id: companyId,
            p_first_name: form.first_name.value.trim(),
            p_last_name: form.last_name.value.trim(),
            p_phone: form.phone.value.trim() || null,
            p_email: form.email.value.trim() || null,
            p_license_number: form.license_number.value.trim() || null,
            p_license_expiration: form.license_expiration.value || null,
            p_photo_url: form.photo_url.value.trim() || null
          })
        });

        const text = await response.text();
        const result = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(result?.message || result?.error || text || "Driver save failed");
        return result;
      }

      document.addEventListener("submit", async function (event) {
        const form = document.getElementById("createDriverForm");
        if (!form || event.target !== form) return;

        event.preventDefault();
        event.stopImmediatePropagation();

        if (!form.first_name.value.trim() || !form.last_name.value.trim()) {
          setDriverMessage("First and last name are required.", "#ef4444");
          return;
        }

        setDriverMessage("Saving driver through secure driver RPC v8...", "#334155");

        try {
          await saveDriverWithRpc(form);
          setDriverMessage("Driver created successfully.", "#047857");
          form.reset();
        } catch (error) {
          console.error("Create driver inline override error:", error);
          setDriverMessage(`Error creating driver: ${error.message || error}`, "#ef4444");
        }
      }, true);
    })();
  </script>
  <script src="create-driver-override.js?v=20260618-driver-override-v6"></script>
  <script src="create-driver.js?v=20260618-token-rpc-v5"></script>

</body>

</html>
