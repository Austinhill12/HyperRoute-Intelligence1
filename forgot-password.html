<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - HyperRoute Intelligence</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="forgot-password.js" defer></script>
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand-panel">
      <img src="assets/hyperroute-logo-clean.png" alt="HyperRoute Intelligence" class="login-logo" />
      <div>
        <p class="section-eyebrow">Account Recovery</p>
        <h1>Get back into your HyperRoute workspace.</h1>
        <p>Send a secure password reset link to the email used for the account.</p>
      </div>
      <div class="login-proof-grid">
        <span>Secure reset</span>
        <span>No password sharing</span>
        <span>Powered by HyperRoute</span>
      </div>
    </section>

    <section class="login-card">
      <div class="login-heading">
        <p class="section-eyebrow">Password Reset</p>
        <h2>Forgot Password</h2>
        <p>Enter the account email and we will send a reset link.</p>
      </div>

      <form id="forgotPasswordForm" class="login-form">
        <div class="field">
          <label for="resetEmail">Email</label>
          <input id="resetEmail" type="email" placeholder="you@company.com" autocomplete="email" required />
        </div>

        <button id="forgotPasswordSubmitBtn" type="submit" class="btn">Send Reset Link</button>
      </form>

      <p id="forgotPasswordMessage" class="message"></p>
      <p class="auth-switch"><a href="login.html">Back to login</a></p>
    </section>
  </main>
</body>
</html>
