<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password - HyperRoute Intelligence</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="reset-password.js" defer></script>
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand-panel">
      <img src="assets/hyperroute-logo-clean.png" alt="HyperRoute Intelligence" class="login-logo" />
      <div>
        <p class="section-eyebrow">Secure Recovery</p>
        <h1>Create a new password.</h1>
        <p>After saving, use the new password to open your HyperRoute workspace.</p>
      </div>
      <div class="login-proof-grid">
        <span>Private account</span>
        <span>Secure reset</span>
        <span>HyperRoute Intelligence</span>
      </div>
    </section>

    <section class="login-card">
      <div class="login-heading">
        <p class="section-eyebrow">New Password</p>
        <h2>Reset Password</h2>
        <p>Enter a new password for your account.</p>
      </div>

      <form id="resetPasswordForm" class="login-form">
        <div class="field">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" minlength="6" autocomplete="new-password" required />
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" minlength="6" autocomplete="new-password" required />
        </div>

        <button id="resetPasswordSubmitBtn" type="submit" class="btn">Save New Password</button>
      </form>

      <p id="resetPasswordMessage" class="message"></p>
      <p class="auth-switch"><a href="login.html">Back to login</a></p>
    </section>
  </main>
</body>
</html>
