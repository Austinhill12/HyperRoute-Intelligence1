<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="User/admin-dashboard.js"></script>
</head>
<body>

  <div class="sidebar">
    <h2>Admin</h2>
    <button class="nav-btn" data-section="users">Manage Users</button>
    <button class="nav-btn" data-section="create">Create User</button>
    <button class="nav-btn" data-section="logs">System Logs</button>
    <button id="logoutBtn" class="logout">Logout</button>
  </div>

  <div class="main">
    <h1>Admin Dashboard</h1>
    <p id="welcome"></p>

    <!-- USERS LIST -->
    <div id="section-users" class="section">
      <h2>All Users</h2>
      <table id="usersTable">
        <thead>
          <tr>
            <th>User ID</th>
            <th>Role</th>
            <th>Edit</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- CREATE USER -->
    <div id="section-create" class="section hidden">
      <h2>Create New User</h2>
      <input id="newEmail" type="email" placeholder="Email">
      <input id="newPassword" type="password" placeholder="Password">
      <select id="newRole">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
      <button id="createUserBtn">Create User</button>
      <p id="createMessage"></p>
    </div>

    <!-- LOGS -->
    <div id="section-logs" class="section hidden">
      <h2>System Logs</h2>
      <p>Logs feature coming soon.</p>
    </div>

  </div>

</body>
</html>
